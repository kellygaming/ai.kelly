<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci - Kellygame</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --red: #ff2244;
            --purple: #7c3aed;
            --purple-light: #a855f7;
            --bg: #07070d;
            --bg2: #0e0e1a;
            --bg3: #13131f;
            --text: #e8e8f0;
            --muted: #888899;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Rajdhani', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: linear-gradient(135deg, var(--bg2) 0%, var(--bg3) 100%);
            border: 2px solid var(--red);
            border-radius: 12px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 0 60px rgba(255, 34, 68, 0.3), inset 0 0 40px rgba(255, 34, 68, 0.1);
            animation: slideIn 0.6s ease;
        }

        @keyframes slideIn {
            from {
                transform: translateY(-40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-family: 'Orbitron', Arial, sans-serif;
            font-size: 3rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            background: linear-gradient(135deg, var(--red) 0%, var(--purple) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .message {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text);
            margin-bottom: 30px;
        }

        .purchase-info {
            background: rgba(255, 34, 68, 0.1);
            border-left: 4px solid var(--red);
            padding: 25px;
            margin: 30px 0;
            border-radius: 6px;
            display: none;
        }

        .purchase-info.show {
            display: block;
        }

        .purchase-info p {
            color: var(--text);
            font-size: 1.15rem;
            font-weight: bold;
            margin: 10px 0;
        }

        .purchase-info .game-name {
            color: var(--red);
            font-size: 1.3rem;
        }

        .info-box {
            background: rgba(255, 34, 68, 0.1);
            border-left: 4px solid var(--red);
            padding: 20px;
            margin: 20px 0;
            border-radius: 6px;
        }

        .info-box p {
            color: var(--muted);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 40px;
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 6px;
            font-family: 'Orbitron', Arial, sans-serif;
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--red) 0%, var(--purple) 100%);
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 30px rgba(255, 34, 68, 0.5);
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--purple);
            color: var(--purple-light);
        }

        .btn-secondary:hover {
            background: rgba(168, 85, 247, 0.1);
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }

        @media (max-width: 600px) {
            .container {
                padding: 40px 25px;
            }

            h1 {
                font-size: 2rem;
            }

            .icon {
                font-size: 3rem;
            }

            .message {
                font-size: 1rem;
            }

            .buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        
        <h1>Merci!</h1>
        
        <div class="message">
            <p id="mainMessage">Votre commande a été enregistrée avec succès!</p>
        </div>

        <!-- Zone d'affichage des données d'achat -->
        <div class="purchase-info" id="purchaseInfo">
            <p id="purchaseMessage"></p>
        </div>

        <div class="info-box">
            <p>
                ⚠️ <strong>Vous n'avez pas confirmé le paiement?</strong><br>
                Si vous avez besoin de renseignements ou si vous rencontrez un problème, 
                veuillez nous contacter via le bouton ci-dessous.
            </p>
        </div>

        <div class="buttons">
            <a href="https://kellygame.shop/" class="btn btn-primary">
                🏠 Retour à l'accueil
            </a>
            
            <a href="https://whatsapp.com/channel/0029VahJmDKGJP8OYE1fH53L" target="_blank" class="btn btn-secondary">
                💬 Contacter le support
            </a>
        </div>
    </div>

    <script>
        // ════════════════════════════════════════════════════════════════
        // RÉCUPÉRER ET AFFICHER LES DONNÉES D'ACHAT
        // ════════════════════════════════════════════════════════════════
        
        document.addEventListener('DOMContentLoaded', function() {
            try {
                const purchase = localStorage.getItem('lastPurchase');
                
                if (purchase) {
                    const data = JSON.parse(purchase);
                    const purchaseInfo = document.getElementById('purchaseInfo');
                    const purchaseMessage = document.getElementById('purchaseMessage');
                    
                    // Extraire les diamants/jetons du package
                    const packageMatch = data.package.match(/^(\d+)/);
                    const amount = packageMatch ? packageMatch[1] : '';
                    
                    // Construire le message
                    const message = `Merci! Votre recharge de <span class="game-name">${amount}D ${data.game}</span> est confirmée`;
                    
                    purchaseMessage.innerHTML = message;
                    purchaseInfo.classList.add('show');
                    
                    // Nettoyer après affichage
                    setTimeout(() => {
                        localStorage.removeItem('lastPurchase');
                    }, 2000);
                }
            } catch (error) {
                console.error('Erreur lors de la récupération des données:', error);
            }
        });

        // Force redirection si on vient de MoneyFusion
        (function() {
            const currentURL = window.location.href;
            
            if (currentURL.includes('moneyfusion') || 
                currentURL.includes('callback') ||
                currentURL.includes('return') ||
                currentURL.includes('redirect')) {
                
                window.location.replace('https://kellygame.shop/success.html');
                return;
            }
            
            console.log('✅ Page de succès chargée correctement');
        })();
    </script>
</body>
</html>
